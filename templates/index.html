<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Agenе</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>


     <div class="hero">
        <div class="hero-left">
            <h1>Contact Agenda</h1>
            <p class="lead">Simple and modern panel to manage your contacts. Login to access your dashboard.</p>
            <div class="hero-illustration" aria-hidden="true"></div>
        </div>
        <div class="hero-right" style="margin-top: 160px;">
            <div class="card form-card login-panel">
                <h2 class="center">Welcome</h2>
                <p class="text-muted center">Enter your username and password</p>
                <form id="loginForm" class="stacked-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Sign In</button>
                </form>
                <p class="text-muted center" id="loginErr"></p>
                <p class="text-muted center">Return to <a href="{{ url_for('index') }}">home page</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            fetch("{{ url_for('login') }}", {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(async response => {
                const data = await response.json();
                return { status: response.status, body: data };
            })
            .then(obj => {
                if (obj.status === 200) {
                    window.location.href = "{{ url_for('index') }}";
                } else {
                    document.getElementById('loginErr').textContent = obj.body.error || 'Authentication error';
                }
            })
            .catch(error => {
                document.getElementById('loginErr').textContent = 'Connection error';
                console.error('Error:', error);
            });
        };
    </script>

    <!-- Bootstrap JS - ОБЯЗАТЕЛЬНО для работы гамбургера -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>





    <script>
        // API fetch wrapper with authentication handling
        function apiFetch(url, opts = {}) {
            opts.credentials = opts.credentials || 'same-origin';
            return fetch(url, opts).then(r => {
                if (r.status === 401) {
                    window.location.href = "{{ url_for('login_page') }}";
                    throw new Error('Unauthorized');
                }
                return r;
            });
        }

        // Logout function
        function logout() {
            apiFetch("{{ url_for('logout') }}", { method: 'POST' })
                .then(() => {
                    window.location.href = "{{ url_for('login_page') }}";
                })
                .catch(err => { 
                    console.error(err); 
                    window.location.href = "{{ url_for('login_page') }}"; 
                });
        }

        // Load contacts on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadContacts();
        });

        // Fetch and display all contacts
        function loadContacts() {
            apiFetch("{{ url_for('get_contacts') }}")
                .then(response => response.json())
                .then(contacts => {
                    displayContacts(contacts);
                })
                .catch(error => console.error('Error loading contacts:', error));
        }

        // Display contacts in the table
        function displayContacts(contacts) {
            const tbody = document.getElementById('contactsBody');
            tbody.innerHTML = '';
            
            if (contacts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No contacts found</td></tr>';
                return;
            }
            
            contacts.forEach(contact => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${contact.name || ''}</td>
                    <td>${contact.phone || ''}</td>
                    <td>${contact.email || ''}</td>
                    <td>${contact.address || ''}</td>
                    <td>
                        <button class="small" onclick="editContact(${contact.id})">Edit</button>
                        <button class="small danger" onclick="deleteContact(${contact.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Search contacts
        function searchContacts() {
            const query = document.getElementById('searchInput').value;
            
            apiFetch(`{{ url_for('search_contacts') }}?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(contacts => {
                    displayContacts(contacts);
                })
                .catch(error => console.error('Error searching contacts:', error));
        }

        // Add new contact
        function addContact() {
            const name = prompt('Enter contact name:');
            if (!name) return;
            
            const phone = prompt('Enter phone number:');
            const email = prompt('Enter email address:');
            const address = prompt('Enter address:');
            
            const contact = {
                name: name,
                phone: phone || '',
                email: email || '',
                address: address || ''
            };
            
            apiFetch("{{ url_for('add_contact') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(contact)
            })
            .then(response => response.json())
            .then(data => {
                alert('Contact added successfully!');
                loadContacts(); // Reload the list
            })
            .catch(error => console.error('Error adding contact:', error));
        }

        // Edit contact
        function editContact(id) {
            // For simplicity, using prompts. In a real app, you'd use a modal form
            const newName = prompt('Enter new name:');
            if (!newName) return;
            
            const newPhone = prompt('Enter new phone:');
            const newEmail = prompt('Enter new email:');
            const newAddress = prompt('Enter new address:');
            
            const contact = {
                name: newName,
                phone: newPhone || '',
                email: newEmail || '',
                address: newAddress || ''
            };
            
            apiFetch(`{{ url_for('update_contact', contact_id=0) }}`.replace('0', id), {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(contact)
            })
            .then(response => response.json())
            .then(data => {
                alert('Contact updated successfully!');
                loadContacts(); // Reload the list
            })
            .catch(error => console.error('Error updating contact:', error));
        }

        // Delete contact
        function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this contact?')) return;
            
            apiFetch(`{{ url_for('delete_contact', contact_id=0) }}`.replace('0', id), {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                alert('Contact deleted successfully!');
                loadContacts(); // Reload the list
            })
            .catch(error => console.error('Error deleting contact:', error));
        }
    </script>
</body>
</html>
