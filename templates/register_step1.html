<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register step 1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

    <div class="split-container">

        <div class="background-layer"></div>

        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Логотип">
        </div>

        <div class="right-panel">
            <div class="register-card">
                <div class="register-sub">Step 1 of 2</div>
                <h1>Sign up</h1>
                <div class="register-sub">Create an account</div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Ana Maria" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <button type="submit" class="register-btn">Continue</button>

                    <div id="formMessage" class="message"></div>
                </form>

                <div class="login-redirect">
                    Already have an account?
                    <a href="{{ url_for('login_page') }}">Log in</a>
                </div>
            </div>
        </div>

    </div>

    <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const formMessage = document.getElementById('formMessage');

        formMessage.textContent = '';

        if (!username || !email) {
            formMessage.textContent = 'Please fill in all fields';
            return;
        }

        if (!email.includes('@')) {
            formMessage.textContent = 'Please enter a valid email address';
            return;
        }

        sessionStorage.setItem('register_username', username);
        sessionStorage.setItem('register_email', email);

        window.location.href = '/register/password';
    });
    </script>

</body>
</html>
